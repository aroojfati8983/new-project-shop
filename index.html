<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Express - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #e67e22;
            font-size: 42px;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 30px;
            margin: 0 10px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
        }

        .nav-links a:hover {
            transform: scale(1.05);
        }

        .form-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
        }

        .form-container label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        .form-container input, .form-container select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .form-container input:focus, .form-container select:focus {
            outline: none;
            border-color: #e67e22;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .form-container button:hover {
            transform: scale(1.02);
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
        }

        .success {
            background: #27ae60;
        }

        .error {
            background: #e74c3c;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🛍️ Ali Express</h1>
        <div class="nav-links">
            <a href="./index.html">🏠 Home</a>
            <a href="./product.html">📦 All Products</a>
        </div>
    </div>

    <div class="form-container">
        <h2>➕ Add New Product</h2>
        
        <label>Product Name *</label>
        <input type="text" id="productName" placeholder="e.g., iPhone 15">
        
        <label>Product Price *</label>
        <input type="number" id="productPrice" placeholder="e.g., 999" step="0.01">
        
        <label>Currency Code *</label>
        <input type="text" id="currencyCode" placeholder="$ or ₹" maxlength="3" value="$">
        
        <label>Number of Sale</label>
        <input type="number" id="numberOfSale" placeholder="e.g., 150" value="0">
        
        <label>Rating (0-5)</label>
        <input type="number" step="0.1" min="0" max="5" id="rating" placeholder="e.g., 4.5" value="0">
        
        <label>Free Shipping</label>
        <select id="isFreeShipping">
            <option value="true">✅ Yes</option>
            <option value="false">❌ No</option>
        </select>
        
        <label>Shop Name *</label>
        <input type="text" id="shopName" placeholder="e.g., Apple Store">
        
        <button onclick="addProduct()">✅ Add Product</button>
    </div>

    <script>
        let baseUrl = "http://localhost:7979/api";

        function showMessage(message, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        async function addProduct() {
            let productName = document.querySelector("#productName").value;
            let productPrice = document.querySelector("#productPrice").value;
            let currencyCode = document.querySelector("#currencyCode").value;
            let numberOfSale = document.querySelector("#numberOfSale").value;
            let rating = document.querySelector("#rating").value;
            let isFreeShipping = document.querySelector("#isFreeShipping").value === "true";
            let shopName = document.querySelector("#shopName").value;
            
            if (!productName || !productPrice || !currencyCode || !shopName) {
                showMessage("Please fill all required fields!", "error");
                return;
            }
            
            try {
                await axios.post(`${baseUrl}/product`, {
                    productName,
                    productPrice: parseFloat(productPrice),
                    currencyCode,
                    numberOfSale: parseInt(numberOfSale) || 0,
                    rating: parseFloat(rating) || 0,
                    isFreeShipping,
                    shopName
                });
                
                showMessage("Product added successfully!", "success");
                
                // Clear form
                document.querySelector("#productName").value = "";
                document.querySelector("#productPrice").value = "";
                document.querySelector("#currencyCode").value = "$";
                document.querySelector("#numberOfSale").value = "0";
                document.querySelector("#rating").value = "0";
                document.querySelector("#isFreeShipping").value = "true";
                document.querySelector("#shopName").value = "";
                
            } catch(error) {
                showMessage("Failed to add product: " + (error.response?.data?.message || error.message), "error");
            }
        }
    </script>
</body>

</html>
