<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ali Express - Add Product</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}
        .header{background:#fff;border-radius:24px;padding:20px;margin-bottom:25px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.15);}
        h1{color:#e67e22;font-size:38px;}
        .nav-links{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:12px;}
        .nav-links a{text-decoration:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:8px 28px;border-radius:40px;font-weight:600;transition:.2s;}
        .nav-links a:hover{transform:translateY(-2px);}
        .form-container{background:#fff;border-radius:24px;padding:28px;max-width:520px;width:100%;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.15);}
        .form-container h2{text-align:center;color:#e67e22;margin-bottom:18px;font-size:1.7rem;}
        .form-container label{display:block;margin:10px 0 4px;font-weight:600;color:#2c3e50;font-size:0.9rem;}
        .form-container input,.form-container select{width:100%;padding:10px;margin:4px 0;border:2px solid #e0e0e0;border-radius:12px;font-size:0.95rem;}
        .form-container input:focus,.form-container select:focus{outline:none;border-color:#e67e22;}
        .form-container button{width:100%;padding:12px;background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;border:none;border-radius:40px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;transition:.2s;}
        .form-container button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(230,126,34,0.3);}
        .toast{position:fixed;top:20px;right:20px;padding:12px 22px;border-radius:50px;color:#fff;font-weight:600;z-index:1000;animation:slideIn .25s;}
        .toast.success{background:#2ecc71;}
        .toast.error{background:#e74c3c;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @media (max-width:768px){h1{font-size:32px;}.form-container{padding:22px;}}
        @media (max-width:600px){h1{font-size:28px;}.nav-links a{padding:7px 20px;font-size:13px;}.form-container h2{font-size:1.4rem;}}
        @media (max-width:480px){
            .nav-links{flex-direction:column;align-items:center;}
            .nav-links a{width:100%;max-width:200px;text-align:center;}
            h1{font-size:24px;}
            .form-container{padding:18px;}
            .form-container h2{font-size:1.3rem;}
            .toast{top:10px;right:10px;left:10px;text-align:center;font-size:13px;}
        }
        @media (max-width:244px){
            body{padding:8px;}
            .header{padding:10px;border-radius:14px;}
            h1{font-size:18px !important;}
            .nav-links{flex-direction:column;gap:6px;}
            .nav-links a{width:100%;padding:6px;font-size:11px;}
            .form-container{padding:12px;border-radius:14px;}
            .form-container h2{font-size:1rem;}
            .form-container label{font-size:0.7rem;margin:6px 0 2px;}
            .form-container input,.form-container select{padding:6px;font-size:0.7rem;}
            .form-container button{padding:8px;font-size:11px;margin-top:12px;}
            .toast{padding:6px 10px;font-size:11px;}
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🛍️ Ali Express</h1>
    <div class="nav-links">
        <a href="./index.html">🏠 Home</a>
        <a href="./product.html">📦 All Products</a>
    </div>
</div>

<div class="form-container">
    <h2>➕ Add New Product</h2>
    <label>Product Name *</label>
    <input type="text" id="name" placeholder="iPhone 15">
    <label>Product Price *</label>
    <input type="number" id="price" placeholder="999" step="0.01">
    <label>Currency Code *</label>
    <input type="text" id="currency" placeholder="$ or ₹" maxlength="3" value="$">
    <label>Number of Sale</label>
    <input type="number" id="sales" value="0">
    <label>Rating (0-5)</label>
    <input type="number" step="0.1" min="0" max="5" id="rating" value="0">
    <label>Free Shipping</label>
    <select id="freeShip">
        <option value="true">✅ Yes</option>
        <option value="false">❌ No</option>
    </select>
    <label>Shop Name *</label>
    <input type="text" id="shop" placeholder="Apple Store">
    <button onclick="addProduct()">✅ Add Product</button>
</div>

<script>
const API = "http://localhost:7979/api";

function toast(msg, type){
    const old = document.querySelector('.toast');
    if(old) old.remove();
    const div = document.createElement('div');
    div.className = `toast ${type}`;
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2800);
}

async function addProduct(){
    const name = document.getElementById('name').value.trim();
    const price = document.getElementById('price').value;
    const currency = document.getElementById('currency').value.trim();
    const sales = document.getElementById('sales').value;
    const rating = document.getElementById('rating').value;
    const freeShip = document.getElementById('freeShip').value === 'true';
    const shop = document.getElementById('shop').value.trim();

    if(!name || !price || !currency || !shop) return toast("❌ Fill all required fields!", "error");
    const priceNum = parseFloat(price);
    if(isNaN(priceNum) || priceNum < 0) return toast("❌ Valid price required", "error");
    const ratingNum = parseFloat(rating);
    if(isNaN(ratingNum) || ratingNum < 0 || ratingNum > 5) return toast("❌ Rating 0-5", "error");

    try{
        await axios.post(`${API}/product`, {
            productName: name,
            productPrice: priceNum,
            currencyCode: currency,
            numberOfSale: parseInt(sales) || 0,
            rating: ratingNum,
            isFreeShipping: freeShip,
            shopName: shop
        });
        toast("✅ Product added!", "success");
        document.getElementById('name').value = "";
        document.getElementById('price').value = "";
        document.getElementById('currency').value = "$";
        document.getElementById('sales').value = "0";
        document.getElementById('rating').value = "0";
        document.getElementById('freeShip').value = "true";
        document.getElementById('shop').value = "";
    } catch(err){
        toast("❌ Failed: " + (err.response?.data?.message || err.message), "error");
    }
}
</script>
</body>
</html>
