<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ali Express - Add Product</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header Styles - Fully Responsive */
        .header {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        h1 {
            color: #e67e22;
            font-size: 42px;
            transition: font-size 0.2s ease;
            word-break: break-word;
        }

        /* Navigation Links - Perfect responsive behavior */
        .nav-links {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .nav-links a {
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Form Container - Responsive */
        .form-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 540px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .form-container h2 {
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-container label {
            display: block;
            margin: 12px 0 5px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-container input, 
        .form-container select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-container input:focus, 
        .form-container select:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
        }

        .form-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
        }

        .form-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230,126,34,0.3);
        }

        /* Toast Messages */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .success {
            background: #27ae60;
        }

        .error {
            background: #e74c3c;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== RESPONSIVE BREAKPOINTS ========== */

        /* Tablet (768px and below) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 34px;
            }

            .nav-links a {
                padding: 8px 22px;
                font-size: 14px;
            }
            
            .form-container {
                padding: 25px;
                max-width: 90%;
            }
            
            .form-container h2 {
                font-size: 1.6rem;
            }
        }

        /* Mobile Landscape (600px and below) */
        @media (max-width: 600px) {
            .header {
                padding: 20px 15px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .nav-links {
                gap: 10px;
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .nav-links a {
                padding: 8px 18px;
                font-size: 13px;
                min-width: 110px;
            }
            
            .form-container {
                padding: 20px;
                border-radius: 20px;
            }
            
            .form-container h2 {
                font-size: 1.4rem;
            }
            
            .form-container label {
                font-size: 0.9rem;
            }
            
            .form-container input,
            .form-container select {
                padding: 10px;
                font-size: 0.9rem;
            }
        }

        /* Mobile Portrait (480px and below) */
        @media (max-width: 480px) {
            .header {
                padding: 18px 12px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .nav-links {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links a {
                width: 100%;
                max-width: 200px;
                text-align: center;
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .form-container {
                padding: 20px 16px;
            }
            
            .form-container h2 {
                font-size: 1.3rem;
                margin-bottom: 15px;
            }
            
            .form-container label {
                margin: 8px 0 4px;
                font-size: 0.85rem;
            }
            
            .form-container input,
            .form-container select {
                padding: 9px;
                font-size: 0.85rem;
                border-radius: 10px;
            }
            
            .form-container button {
                padding: 12px;
                font-size: 14px;
                margin-top: 20px;
            }
            
            .message {
                top: 10px;
                right: 10px;
                left: 10px;
                text-align: center;
                font-size: 0.85rem;
                padding: 10px 16px;
            }
        }

        /* Extra Small - 320px and below */
        @media (max-width: 320px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 12px 10px;
                border-radius: 16px;
                margin-bottom: 15px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .nav-links {
                gap: 8px;
            }
            
            .nav-links a {
                padding: 7px 12px;
                font-size: 12px;
                max-width: 180px;
            }
            
            .form-container {
                padding: 16px 12px;
                border-radius: 16px;
            }
            
            .form-container h2 {
                font-size: 1.2rem;
            }
            
            .form-container label {
                font-size: 0.8rem;
                margin: 6px 0 3px;
            }
            
            .form-container input,
            .form-container select {
                padding: 8px;
                font-size: 0.8rem;
            }
            
            .form-container button {
                padding: 10px;
                font-size: 13px;
                margin-top: 16px;
            }
        }

        /* ULTRA SMALL - 244px SPECIFIC BREAKPOINT (as requested) */
        @media (max-width: 244px) {
            body {
                padding: 8px 6px;
            }
            
            .header {
                padding: 10px 6px;
                border-radius: 14px;
                margin-bottom: 12px;
            }
            
            h1 {
                font-size: 18px !important;
                letter-spacing: -0.3px;
            }
            
            /* Nav links - optimized for 244px */
            .nav-links {
                margin-top: 10px;
                gap: 6px;
                flex-direction: column;
                align-items: stretch;
            }
            
            .nav-links a {
                width: 100%;
                max-width: none;
                padding: 6px 8px;
                font-size: 11px;
                border-radius: 30px;
                text-align: center;
            }
            
            .form-container {
                padding: 14px 10px;
                border-radius: 14px;
            }
            
            .form-container h2 {
                font-size: 1rem;
                margin-bottom: 12px;
            }
            
            .form-container label {
                font-size: 0.7rem;
                margin: 5px 0 3px;
            }
            
            .form-container input,
            .form-container select {
                padding: 6px 8px;
                font-size: 0.7rem;
                border-radius: 8px;
                border-width: 1.5px;
            }
            
            .form-container button {
                padding: 8px;
                font-size: 11px;
                margin-top: 14px;
                border-radius: 30px;
            }
            
            .message {
                top: 8px;
                right: 8px;
                left: 8px;
                padding: 8px 12px;
                font-size: 0.7rem;
                border-radius: 30px;
            }
            
            /* Adjust placeholder font size */
            .form-container input::placeholder,
            .form-container select {
                font-size: 0.65rem;
            }
        }

        /* Additional fix for very narrow screens (below 200px) */
        @media (max-width: 200px) {
            h1 {
                font-size: 16px !important;
            }
            
            .nav-links a {
                font-size: 9px;
                padding: 5px 6px;
            }
            
            .form-container h2 {
                font-size: 0.85rem;
            }
            
            .form-container label {
                font-size: 0.6rem;
            }
            
            .form-container input,
            .form-container select {
                font-size: 0.6rem;
                padding: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🛍️ Ali Express</h1>
        <div class="nav-links">
            <a href="./index.html">🏠 Home</a>
            <a href="./product.html">📦 All Products</a>
        </div>
    </div>

    <div class="form-container">
        <h2>➕ Add New Product</h2>
        
        <label>Product Name *</label>
        <input type="text" id="productName" placeholder="e.g., iPhone 15">
        
        <label>Product Price *</label>
        <input type="number" id="productPrice" placeholder="e.g., 999" step="0.01">
        
        <label>Currency Code *</label>
        <input type="text" id="currencyCode" placeholder="$ or ₹" maxlength="3" value="$">
        
        <label>Number of Sale</label>
        <input type="number" id="numberOfSale" placeholder="e.g., 150" value="0">
        
        <label>Rating (0-5)</label>
        <input type="number" step="0.1" min="0" max="5" id="rating" placeholder="e.g., 4.5" value="0">
        
        <label>Free Shipping</label>
        <select id="isFreeShipping">
            <option value="true">✅ Yes</option>
            <option value="false">❌ No</option>
        </select>
        
        <label>Shop Name *</label>
        <input type="text" id="shopName" placeholder="e.g., Apple Store">
        
        <button onclick="addProduct()">✅ Add Product</button>
    </div>

    <script>
        let baseUrl = "http://localhost:7979/api";

        function showMessage(message, type) {
            // Remove any existing messages to prevent duplicates
            const existingMessages = document.querySelectorAll('.message');
            existingMessages.forEach(msg => msg.remove());
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        async function addProduct() {
            let productName = document.querySelector("#productName").value.trim();
            let productPrice = document.querySelector("#productPrice").value;
            let currencyCode = document.querySelector("#currencyCode").value.trim();
            let numberOfSale = document.querySelector("#numberOfSale").value;
            let rating = document.querySelector("#rating").value;
            let isFreeShipping = document.querySelector("#isFreeShipping").value === "true";
            let shopName = document.querySelector("#shopName").value.trim();
            
            // Validation
            if (!productName || !productPrice || !currencyCode || !shopName) {
                showMessage("❌ Please fill all required fields!", "error");
                return;
            }
            
            const priceNum = parseFloat(productPrice);
            if (isNaN(priceNum) || priceNum < 0) {
                showMessage("❌ Please enter a valid price!", "error");
                return;
            }
            
            const ratingNum = parseFloat(rating);
            if (isNaN(ratingNum) || ratingNum < 0 || ratingNum > 5) {
                showMessage("❌ Rating must be between 0 and 5!", "error");
                return;
            }
            
            try {
                await axios.post(`${baseUrl}/product`, {
                    productName,
                    productPrice: priceNum,
                    currencyCode,
                    numberOfSale: parseInt(numberOfSale) || 0,
                    rating: ratingNum,
                    isFreeShipping,
                    shopName
                });
                
                showMessage("✅ Product added successfully!", "success");
                
                // Clear form
                document.querySelector("#productName").value = "";
                document.querySelector("#productPrice").value = "";
                document.querySelector("#currencyCode").value = "$";
                document.querySelector("#numberOfSale").value = "0";
                document.querySelector("#rating").value = "0";
                document.querySelector("#isFreeShipping").value = "true";
                document.querySelector("#shopName").value = "";
                
            } catch(error) {
                console.error("Add product error:", error);
                const errorMsg = error.response?.data?.message || error.message || "Network error";
                showMessage(`❌ Failed: ${errorMsg}`, "error");
            }
        }
        
        // Optional: Add enter key support for better UX
        document.querySelectorAll('#productName, #productPrice, #currencyCode, #shopName').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addProduct();
                }
            });
        });
    </script>
</body>
</html>
