<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ali Express · Products</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:system-ui,
            'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}

        .header{background:#fff;border-radius:24px;padding:20px;margin-bottom:25px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.15);}
        h1{color:#e67e22;font-size:38px;}
        .nav-links{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:12px;}
        .nav-links a{text-decoration:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:8px 28px;border-radius:40px;font-weight:600;transition:.2s;}
        .nav-links a:hover{transform:translateY(-2px);}
        .add-btn{display:block;margin:0 auto 25px;padding:10px 28px;background:#2196F3;color:#fff;border:none;border-radius:40px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;}
        .add-btn:hover{transform:scale(1.02);}
        #productsListDiv{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;}
        .card{background:#fff;border-radius:20px;width:280px;padding:18px;transition:.2s;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
        .card:hover{transform:translateY(-5px);}
        .card img{width:100%;height:160px;object-fit:cover;border-radius:14px;margin-bottom:12px;background:#f0f0f0;}
        .card h3{font-size:18px;text-align:center;margin:8px 0;}
        .price{text-align:center;background:#fef5e8;padding:6px;border-radius:30px;margin:10px 0;}
        .price span:first-child{font-size:18px;}
        .price span:last-child{font-size:28px;font-weight:700;color:#e67e22;}
        .sold,.shop{font-size:13px;margin:6px 0;color:#555;}
        .free{color:#2ecc71;font-weight:600;}
        .nofree{color:#e74c3c;font-weight:600;}
        .actions{display:flex;gap:8px;margin-top:12px;}
        .delete,.edit{flex:1;border:none;padding:8px;border-radius:30px;font-weight:600;color:#fff;cursor:pointer;}
        .delete{background:#e74c3c;}
        .edit{background:#27ae60;}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:15px;}
        .modal-content{background:#fff;padding:24px;border-radius:24px;width:450px;max-width:100%;max-height:85vh;overflow:auto;}
        .modal-content h2{color:#e67e22;margin-bottom:16px;text-align:center;}
        .modal-content label{display:block;font-weight:600;margin:10px 0 4px;font-size:13px;}
        .modal-content input,.modal-content select{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:14px;margin-bottom:6px;}
        .modal-content button{width:100%;padding:12px;background:#e67e22;border:none;border-radius:40px;color:#fff;font-weight:700;margin-top:16px;cursor:pointer;}
        .close-modal{float:right;font-size:26px;cursor:pointer;color:#999;}
        .loading{text-align:center;color:#fff;font-size:20px;padding:40px;}
        .toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:50px;color:#fff;z-index:1100;animation:slideIn .2s;}
        .toast.success{background:#2ecc71;}
        .toast.error{background:#e74c3c;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @media (max-width:480px){
            .nav-links{flex-direction:column;align-items:center;}
            .nav-links a{width:100%;max-width:200px;text-align:center;}
            h1{font-size:28px;}
        }
        @media (max-width:244px){
            body{padding:8px;}
            .header{padding:10px;border-radius:16px;}
            h1{font-size:18px !important;}
            .nav-links{flex-direction:column;gap:6px;}
            .nav-links a{width:100%;padding:6px;font-size:11px;}
            .add-btn{font-size:11px;padding:6px 12px;}
            .card{width:100%;padding:10px;}
            .card img{height:110px;}
            .price span:last-child{font-size:18px;}
            .delete,.edit{font-size:10px;padding:5px;}
            .modal-content{padding:12px;}
            .toast{top:10px;right:10px;left:10px;text-align:center;font-size:12px;}
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🛍️ Ali Express</h1>
    <div class="nav-links">
        <a href="./index.html">🏠 Home</a>
        <a href="./product.html">📦 All Products</a>
    </div>
</div>
<button class="add-btn" onclick="showAddModal()">➕ Add New Product</button>
<div id="productsListDiv"><div class="loading">⏳ Loading...</div></div>
<div id="modalRoot"></div>

<script>
const API = "http://localhost:7979/api";
let products = [];

function toast(msg, type){
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2500);
}

function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

async function fetchProducts(){
    try{
        const res = await axios.get(API+"/products");
        products = res.data;
        const container = document.getElementById("productsListDiv");
        if(!products.length){
            container.innerHTML = `<div class="loading">📭 No products. Click "Add New Product"</div>`;
            return;
        }
        container.innerHTML = products.map(p=>`
            <div class="card">
                <img src="./img/airpod.webp" onerror="this.src='https://placehold.co/400x200?text=Product'" alt="${escape(p.productName)}">
                <h3>${escape(p.productName)}</h3>
                <div class="price"><span>${escape(p.currencyCode||'$')}</span> <span>${p.productPrice||0}</span></div>
                <div class="sold">📦 ${p.numberOfSale||0} sold</div>
                <div class="${p.isFreeShipping ? 'free' : 'nofree'}">${p.isFreeShipping ? '✓ Free Shipping' : '✗ No free shipping'}</div>
                <div class="shop">🏪 ${escape(p.shopName||'Unknown')}</div>
                <div>⭐ ${p.rating||0} / 5</div>
                <div class="actions">
                    <button class="delete" onclick="deleteProduct('${p._id}')">🗑️ Delete</button>
                    <button class="edit" onclick="editProduct('${p._id}')">✏️ Edit</button>
                </div>
            </div>
        `).join('');
    }catch(e){
        document.getElementById("productsListDiv").innerHTML = `<div class="loading">❌ Server error at ${API}</div>`;
        toast("Failed to load products","error");
    }
}

async function deleteProduct(id){
    if(!confirm("Delete product?")) return;
    try{
        await axios.delete(`${API}/product/${id}`);
        toast("Deleted!","success");
        fetchProducts();
    }catch(e){ toast("Delete failed","error"); }
}

function showAddModal(){
    document.getElementById("modalRoot").innerHTML = `
        <div class="modal"><div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>➕ Add Product</h2>
            <label>Name *</label><input id="add_name" placeholder="iPhone 15">
            <label>Price *</label><input id="add_price" type="number" step="0.01" placeholder="999">
            <label>Currency *</label><input id="add_currency" maxlength="3" value="$">
            <label>Sales</label><input id="add_sales" type="number" value="0">
            <label>Rating (0-5)</label><input id="add_rating" type="number" step="0.1" min="0" max="5" value="0">
            <label>Free Shipping</label>
            <select id="add_free"><option value="true">✅ Yes</option><option value="false">❌ No</option></select>
            <label>Shop *</label><input id="add_shop" placeholder="Apple Store">
            <button onclick="addProduct()">✅ Add Product</button>
        </div></div>
    `;
}

async function addProduct(){
    const name = document.getElementById("add_name")?.value.trim();
    const price = document.getElementById("add_price")?.value;
    const currency = document.getElementById("add_currency")?.value.trim();
    const sales = document.getElementById("add_sales")?.value;
    const rating = document.getElementById("add_rating")?.value;
    const free = document.getElementById("add_free")?.value === "true";
    const shop = document.getElementById("add_shop")?.value.trim();
    if(!name || !price || !currency || !shop) return toast("Fill all * fields","error");
    try{
        await axios.post(`${API}/product`,{
            productName:name, productPrice:parseFloat(price), currencyCode:currency,
            numberOfSale:parseInt(sales)||0, rating:parseFloat(rating)||0, isFreeShipping:free, shopName:shop
        });
        toast("Product added!","success");
        closeModal();
        fetchProducts();
    }catch(e){ toast("Add failed","error"); }
}

async function editProduct(id){
    try{
        const res = await axios.get(`${API}/product/${id}`);
        const p = res.data;
        document.getElementById("modalRoot").innerHTML = `
            <div class="modal"><div class="modal-content">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <h2>✏️ Edit Product</h2>
                <input type="hidden" id="edit_id" value="${p._id}">
                <label>Name *</label><input id="edit_name" value="${escape(p.productName)}">
                <label>Price *</label><input id="edit_price" type="number" step="0.01" value="${p.productPrice}">
                <label>Currency *</label><input id="edit_currency" maxlength="3" value="${escape(p.currencyCode||'$')}">
                <label>Sales</label><input id="edit_sales" type="number" value="${p.numberOfSale||0}">
                <label>Rating (0-5)</label><input id="edit_rating" type="number" step="0.1" min="0" max="5" value="${p.rating||0}">
                <label>Free Shipping</label>
                <select id="edit_free"><option value="true" ${p.isFreeShipping ? "selected":""}>✅ Yes</option><option value="false" ${!p.isFreeShipping ? "selected":""}>❌ No</option></select>
                <label>Shop *</label><input id="edit_shop" value="${escape(p.shopName)}">
                <button onclick="updateProduct()">💾 Update</button>
            </div></div>
        `;
    }catch(e){ toast("Cannot load product","error"); }
}

async function updateProduct(){
    const id = document.getElementById("edit_id")?.value;
    const name = document.getElementById("edit_name")?.value.trim();
    const price = document.getElementById("edit_price")?.value;
    const currency = document.getElementById("edit_currency")?.value.trim();
    const sales = document.getElementById("edit_sales")?.value;
    const rating = document.getElementById("edit_rating")?.value;
    const free = document.getElementById("edit_free")?.value === "true";
    const shop = document.getElementById("edit_shop")?.value.trim();
    if(!name || !price || !currency || !shop) return toast("Fill all fields","error");
    try{
        await axios.put(`${API}/product/${id}`,{
            productName:name, productPrice:parseFloat(price), currencyCode:currency,
            numberOfSale:parseInt(sales)||0, rating:parseFloat(rating)||0, isFreeShipping:free, shopName:shop
        });
        toast("Updated!","success");
        closeModal();
        fetchProducts();
    }catch(e){ toast("Update failed","error"); }
}

function escape(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m=='&'?'&amp;':m=='<'?'&lt;':'&gt;'; }); }

fetchProducts();
</script>
</body>
</html>
